<!DOCTYPE html>
<html>
<head>
  <title>SOQOTRA Cargo Tracking</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .result {
      margin-top: 30px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>📦 SOQOTRA CARGO TRACKING</h1>

  <input type="text" id="tracking" placeholder="Enter Tracking Number">
  <button onclick="track()">Track</button>

  <div id="result" class="result"></div>

  <script>
    function track() {
      const tracking = document.getElementById("tracking").value;

      fetch(`https://soqotra-cargo.onrender.com/api/track/${tracking}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("result").innerHTML = `
            <h3>Tracking Result</h3>
            <p><b>Tracking:</b> ${data.tracking_number}</p>
            <p><b>Shipper:</b> ${data.shipper_name}</p>
            <p><b>Consignee:</b> ${data.consignee_name}</p>
            <p><b>Status:</b> ${data.status}</p>
          `;
        })
        .catch(() => {
          document.getElementById("result").innerHTML = "❌ Not Found";
        });
    }
  </script>

</body>
</html>
