<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Shipment</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 50px;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<h1>✏️ Update Shipment Status</h1>

<div class="container">
    <input type="text" id="tracking" placeholder="Tracking Number">
    <input type="text" id="status" placeholder="New Status (DELIVERED / IN TRANSIT)">
    
    <button onclick="updateStatus()">Update Status</button>
</div>

<script>
function updateStatus() {
    const data = {
        tracking_number: document.getElementById("tracking").value,
        status: document.getElementById("status").value
    };

    fetch("/api/update-status", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    })
    .catch(err => {
        alert("Error updating shipment");
    });
}
</script>

</body>
</html>
