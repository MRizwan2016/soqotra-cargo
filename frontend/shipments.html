<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shipment List</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 30px;
}

h1 {
    text-align: center;
}

#search {
    padding: 10px;
    width: 300px;
    margin-bottom: 20px;
    border-radius: 5px;
    border: none;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #444;
    text-align: center;
}

th {
    background: #1e293b;
}

tr:hover {
    background: #334155;
}

.status {
    font-weight: bold;
}

button {
    padding: 6px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.delete-btn {
    background: #ef4444;
    color: white;
}

.delete-btn:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<h1>📋 Shipment List</h1>

<input type="text" id="search" placeholder="Search Tracking Number..." onkeyup="filterTable()">

<table id="shipmentTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Tracking No</th>
            <th>Shipper</th>
            <th>Consignee</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

// LOAD DATA
fetch("/api/shipments")
.then(res => res.json())
.then(data => {

    const table = document.querySelector("#shipmentTable tbody");

    data.forEach(item => {
        const row = `
        <tr>
            <td>${item.id}</td>
            <td>${item.tracking_number}</td>
            <td>${item.shipper_name}</td>
            <td>${item.consignee_name}</td>
            <td class="status">${item.status}</td>
            <td>${new Date(item.created_at).toLocaleString()}</td>
            <td>
                <button class="delete-btn" onclick="deleteShipment(${item.id})">Delete</button>
            </td>
        </tr>
        `;
        table.innerHTML += row;
    });

})
.catch(err => {
    alert("Error loading shipments");
});


// DELETE FUNCTION
function deleteShipment(id) {

    if (!confirm("Are you sure to delete this shipment?")) return;

    fetch(`/api/delete/${id}`, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        location.reload();
    })
    .catch(err => {
        alert("Error deleting shipment");
    });
}


// SEARCH FUNCTION
function filterTable() {

    const input = document.getElementById("search").value.toUpperCase();
    const rows = document.querySelectorAll("#shipmentTable tbody tr");

    rows.forEach(row => {
        const tracking = row.cells[1].innerText.toUpperCase();
        row.style.display = tracking.includes(input) ? "" : "none";
    });

}

</script>

</body>
</html>
