<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Shipment</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 50px;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<h1>📦 Add Shipment</h1>

<div class="container">
    <input type="text" id="tracking" placeholder="Tracking Number">
    <input type="text" id="shipper" placeholder="Shipper Name">
    <input type="text" id="consignee" placeholder="Consignee Name">
    <input type="text" id="status" placeholder="Status (IN TRANSIT / DELIVERED)">
    
    <button onclick="addShipment()">Save Shipment</button>
</div>

<script>
async function saveShipment() {
  const tracking_number = document.getElementById("tracking").value;
  const shipper_name = document.getElementById("shipper").value;
  const consignee_name = document.getElementById("consignee").value;
  const status = document.getElementById("status").value;

  const res = await fetch("/api/add-shipment", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      tracking_number,
      shipper_name,
      consignee_name,
      status
    })
  });

  const data = await res.json();

  if (res.status === 200) {
    alert("Shipment added successfully");
    window.location.href = "/shipments.html";
  } else {
    alert(data.message || "Error saving shipment");
  }
}
</script>

</body>
</html>
