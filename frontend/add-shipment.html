<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Shipment</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 50px;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<h1>📦 Add Shipment</h1>

<div class="container">
    <input type="text" id="tracking" placeholder="Tracking Number">
    <input type="text" id="shipper" placeholder="Shipper Name">
    <input type="text" id="consignee" placeholder="Consignee Name">
    <input type="text" id="status" placeholder="Status (IN TRANSIT / DELIVERED)">
    
    <button onclick="addShipment()">Save Shipment</button>
</div>

<script>
function addShipment() {
    const data = {
        tracking_number: document.getElementById("tracking").value,
        shipper_name: document.getElementById("shipper").value,
        consignee_name: document.getElementById("consignee").value,
        status: document.getElementById("status").value
    };

    fetch("/api/add-shipment", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    })
    .catch(err => {
        alert("Error saving shipment");
    });
}
</script>

</body>
</html>
